name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
          python-version: "3.11"
      - run: uv sync
      - run: uv run ruff check .
      - run: uv run ruff format --check .

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
          python-version: "3.11"
      - run: uv sync
      - run: uv run pytest --cov-fail-under=100
      # Packaging smoke test: exercises importlib.resources resolution of the shipped
      # schema end to end (the $schema pointer in a fresh config) without needing `claude`.
      - run: uv run docket init --dry-run
